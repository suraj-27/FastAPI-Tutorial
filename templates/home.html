{% extends "layout.html" %}

{% block content %}

<div class="text-center mb-5">
    <h1 class="display-4 fw-bold">
        Welcome to FastAPI Blog
    </h1>
    <p class="text-muted">
        Learn FastAPI, Python, SQL and Backend Development
    </p>
</div>
<div class="row">

{% for post in posts %}
<div class="col-md-6 mb-4">
    <div class="card post-card h-100">
        <div class="card-body">
            <h3 class="card-title">
                {{ post.title }}
            </h3>
            <h6 class="text-muted mb-3">
                By {{ post.author }}
            </h6>
            <p class="card-text">
                {{ post.content }}
            </p>
        </div>
        <div class="card-footer bg-white">
            <small class="text-secondary">
                {{ post.date_posted }}
            </small>
        </div>
    </div>
</div>
{% endfor %}
</div>
{% endblock content %}
