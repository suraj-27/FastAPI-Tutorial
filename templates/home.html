<!DOCTYPE html>
<html lang="en">
<head>
    <title>
        {% if title %} 
            FastAPI Blog - {{ title }}
        {% else %}
            API Blog 
        {% endif%}
    </title>
</head>
<body>
    <h1>Home Page</h1>
    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
        <p>{{ post.author }}</p>
        <p>{{ post.date_posted }}</p>
     {% endfor %}
</body>
</html>
